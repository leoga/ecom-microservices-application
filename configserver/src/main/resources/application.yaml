spring:
  application:
    name: configserver
#  profiles:
#    active: native
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  cloud:
    config:
      server:
        git:
          uri: https://github.com/leoga/app-configuration
          search-paths:
            - ecom-microservices
# in case of private repository
#          username: ${GIT_USER}
#          password: ${GIT_TOKEN}

encrypt:
  key-store:
    location: config-server.jks
    password: mypass
    alias: config-server-key

#eureka:
#  client:
#    serviceUrl:
#      defaultZone: http://localhost:8761/eureka
#    register-with-eureka: true
#    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: "busrefresh,prometheus"
  tracing:
    sampling:
      probability: 1.0 # It means that it will capture 100% of the requests. This should be 10% or 20% (0.1 or 0.2)

server:
  port: 8889

logging:
  level:
    root: INFO #(TRACE, DEBUG, INFO, WARN, ERROR)
  file:
    name: logs/${spring.application.name}.log
  logback:
    rollingpolicy:
      max-file-size: 5MB
      max-history: 7 # It stores them for 7 days