spring:
  application:
    name: order-service
  cloud:
    stream:
      default-binder: rabbit # (for spring cloud bus, configServer)
      bindings:
        createOrder-out-0:
          destination: order-topic
          content-type: application/json
          binder: kafka
      kafka:
        binder:
          brokers: kafka:19092

  datasource:
    url: jdbc:postgresql://postgres:5432/order
#User and password are leoga. They are encrypted using a keystore and an RSA key pair. The Keystore was generated with java keytool (located in the bin folder of java installation)
    username: "{cipher}"
    password: "{cipher}"
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    virtual-host: ${RABBITMQ_VHOST:guest}
    connection-timeout: 30000

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: "busrefresh, prometheus, health, circuitbreakers, circuitbreakerevents"
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        endpoint: ${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka:8761/eureka
    register-with-eureka: true
    fetch-registry: true

logging:
  level:
    root: INFO #(TRACE, DEBUG, INFO, WARN, ERROR)
  file:
    name: logs/${spring.application.name}.log
  logback:
    rollingpolicy:
      max-file-size: 5MB
      max-history: 7 # It stores them for 7 days

# Circuit Breaker
resilience4j:
  circuitbreaker:
    instances:
      productService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 10s
        failure-rate-threshold: 50
        automatic-transition-from-open-to-half-open-enabled: true
        sliding-window-type: count_based
  retry:
    instances:
      retryBreaker:
        max-attempts: 5
        wait-duration: 500ms
  ratelimiter:
    instances:
      rateBreaker:
        timeout-duration: 0
        limit-refresh-period: 4s
        limit-for-period: 2

build:
  id: Native docker id
  version: Native docker version
  name: Native docker name