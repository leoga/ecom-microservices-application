scrape_configs:
  - job_name: 'configserver'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 3s
    static_configs:
      - targets: ['host.docker.internal:8889']
        labels:
          application: 'configserver'
  - job_name: 'eureka'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 3s
    static_configs:
      - targets: ['host.docker.internal:8761']
        labels:
          application: 'eureka'
  - job_name: 'gateway'
